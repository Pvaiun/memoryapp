<!-- Monochrome notification badge (§11). Android/Chrome render the badge from the
     image's ALPHA channel only, tinting it a solid colour, so this is a white
     silhouette on a transparent background — never a filled tile. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <circle cx="38" cy="41" r="21" fill="#ffffff"/>
  <circle cx="62" cy="56" r="13" fill="#ffffff"/>
  <circle cx="64" cy="32" r="8" fill="#ffffff"/>
  <circle cx="41" cy="68" r="6" fill="#ffffff"/>
</svg>
